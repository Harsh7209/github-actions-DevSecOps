name: deploy_falsk_app
on:
  workflow_dispatch:
jobs:
  code-check:
    runs-on: self-hosted
    steps:
      - name: running code check
        uses: actions/checkout@v4
  docker_buildx:
    runs-on: self-hosted
    steps:
      - name: setting up docker buildx
        uses: docker/setup-buildx-action@v3 
  docker_login: 
    runs-on: self-hosted
    steps: 
        - name: login to docker
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}
  docker_push:
    runs-on: self-hosted
    steps: 
        - name: pushing the image to docker hub
          uses:  docker/build-push-action@v6
          with:
            context: .
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:${{ github.sha }}
            push: true
  docker_deploy: 
    runs-on: self-hosted
    steps: 
        - name: deploying container on self hosted runner
          run: |
            docker compose pull
            docker compose up -d --build
          env:
            DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
            TAG: ${{ github.sha }}
                   